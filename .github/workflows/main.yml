name: Android Debug Build (Multi-Module)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:      # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Modify app module's applicationId
        run: |
          echo "🔄 修改 app 模块的 applicationId 为 gudao.gudaoapp.udp"
          
          # 处理 Groovy DSL (build.gradle)
          if [ -f app/build.gradle ]; then
            sed -i 's/applicationId "[^"]*"/applicationId "gudao.gudaoapp.udp"/g' app/build.gradle
          fi
          
          # 处理 Kotlin DSL (build.gradle.kts)
          if [ -f app/build.gradle.kts ]; then
            sed -i 's/applicationId = "[^"]*"/applicationId = "gudao.gudaoapp.udp"/g' app/build.gradle.kts
          fi
          
          echo "✅ 包名修改完成"

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
